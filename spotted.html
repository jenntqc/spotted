<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spotted — Real-time biodiversity</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --text: #e8e4df;
    --accent: #c4ff36;
    --danger-cr: #ff2d2d;
    --danger-en: #ff8c00;
    --danger-vu: #ffd700;
    --muted: #5a5550;
    --muted-light: #7a756f;
    --border: #1e1e1e;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: 'Space Mono', monospace; height: 100vh; overflow: hidden; }

  .loader { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1rem; z-index: 1000; transition: opacity 0.8s ease; }
  .loader.hidden { opacity: 0; pointer-events: none; }
  .loader-text { font-family: 'Instrument Serif', serif; font-size: 1.8rem; color: var(--muted); animation: pulse 1.5s ease-in-out infinite; }
  .loader-sub { font-size: 0.7rem; color: var(--muted); letter-spacing: 0.15em; text-transform: uppercase; }
  @keyframes pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }

  .container { height: 100vh; display: grid; grid-template-columns: 55% 45%; opacity: 0; transition: opacity 0.6s ease; position: relative; }
  .container.visible { opacity: 1; }

  /* ── Photo ── */
  .photo-zone { position: relative; overflow: hidden; background: #080808; z-index: 1; }
  .carousel-track { width: 100%; height: 100%; position: relative; }
  .carousel-track img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0; transition: opacity 1s ease; filter: contrast(1.08) saturate(0.85); }
  .carousel-track img.active { opacity: 1; }
  .photo-overlay { position: absolute; bottom: 0; left: 0; right: 0; height: 35%; background: linear-gradient(transparent, rgba(10,10,10,0.8)); pointer-events: none; z-index: 2; }
  .photo-top-overlay { position: absolute; top: 0; left: 0; right: 0; height: 20%; background: linear-gradient(rgba(10,10,10,0.75), transparent); pointer-events: none; z-index: 2; }
  .carousel-dots { position: absolute; bottom: 1rem; left: 50%; transform: translateX(-50%); display: flex; gap: 0.5rem; z-index: 5; }
  .carousel-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); transition: all 0.3s ease; }
  .carousel-dot.active { background: var(--accent); transform: scale(1.4); }
  .photo-placeholder { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: #0d0d0d; color: var(--muted); font-size: 0.75rem; letter-spacing: 0.1em; text-transform: uppercase; }

  /* Photo overlays: SPOTTED, LIVE, credit, globe */
  .spotted-badge { position: absolute; top: 1rem; left: 1.2rem; z-index: 5; display: flex; flex-direction: column; gap: 3px; }
  .spotted-badge .wordmark { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 1.2rem; letter-spacing: 0.02em; font-weight: 700; color: #fff; }
  .spotted-dot { display: inline-block; width: 8px; height: 8px; background: var(--accent); border-radius: 50%; margin: 0 1px; vertical-align: middle; position: relative; top: -1px; }
  .spotted-badge .tagline { font-family: 'Instrument Serif', serif; font-size: 0.85rem; color: rgba(255,255,255,0.55); font-style: italic; }
  .live-badge { position: absolute; top: 1rem; right: 1.2rem; z-index: 5; display: flex; flex-direction: column; align-items: flex-end; gap: 3px; background: rgba(10,10,10,0.65); padding: 0.45rem 0.65rem; border-radius: 4px; backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); }
  .live-top { display: flex; align-items: center; gap: 5px; }
  .live-dot { width: 6px; height: 6px; background: var(--accent); border-radius: 50%; }
  .live-dot.blink { animation: blink 2s ease-in-out infinite; }
  .live-label { font-size: 0.65rem; color: var(--accent); letter-spacing: 0.2em; font-weight: 700; }
  .live-obs { font-family: 'Space Mono', monospace; font-size: 0.5rem; color: rgba(255,255,255,0.5); letter-spacing: 0.12em; text-transform: uppercase; text-align: right; }
  .live-obs:empty { display: none; }
  .live-obs .obs-count { color: var(--accent); font-weight: 700; }
  .live-obs .obs-count.muted { color: rgba(255,255,255,0.35); }
  @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }
  .photo-credit { position: absolute; bottom: 1rem; left: 1.2rem; font-size: 0.55rem; color: rgba(255,255,255,0.45); letter-spacing: 0.15em; text-transform: uppercase; z-index: 5; }

  /* Globe overlay (bottom-right of photo) */
  .globe-container { position: fixed; bottom: 1rem; left: calc(55% - 220px); width: 200px; height: 200px; z-index: 20; opacity: 0; transition: opacity 0.6s ease 0.3s; }
  .globe-container.visible { opacity: 1; }
  .globe-location { position: absolute; font-family: 'Instrument Serif', serif; font-size: 0.85rem; color: #fff; text-align: center; line-height: 1.15; text-shadow: 0 1px 4px rgba(0,0,0,0.9); white-space: nowrap; z-index: 2; pointer-events: none; }
  .globe-ring { position: absolute; inset: 0; }
  
  .globe-svg { position: absolute; inset: 0; border-radius: 50%; overflow: hidden; background: #111; border: 1px solid var(--border); }
  .globe-svg svg { width: 100%; height: 100%; display: block; }
  #mapDotPulse { transform-box: fill-box; transform-origin: center; animation: mapPing 2s cubic-bezier(0, 0, 0.2, 1) infinite; }
  @keyframes mapPing { 0% { transform: scale(1); opacity: 0.5; } 80%, 100% { transform: scale(2.5); opacity: 0; } }

  /* ── Info side ── */
  .info-side { padding: 1.5rem 2rem 1.5rem; display: flex; flex-direction: column; height: 100vh; gap: 1.2rem; position: relative; z-index: 1; }

  .status-badge { display: inline-block; padding: 0.25rem 0.7rem; font-size: 0.6rem; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase; border-radius: 2px; width: fit-content; flex-shrink: 0; }
  .status-cr { background: var(--danger-cr); color: #000; }
  .status-en { background: var(--danger-en); color: #000; }
  .status-vu { background: var(--danger-vu); color: #000; }

  .species-section { flex: 1; display: flex; flex-direction: column; gap: 1.2rem; min-height: 0; }
  .species-identity { opacity: 0; transform: translateY(15px); transition: all 0.7s cubic-bezier(0.25, 0.46, 0.45, 0.94); }
  .species-identity.visible { opacity: 1; transform: translateY(0); }
  .species-name { font-family: 'Instrument Serif', serif; font-size: 2.8rem; line-height: 0.98; letter-spacing: -0.01em; overflow-wrap: break-word; }
  .species-latin { font-size: 0.75rem; font-style: italic; color: var(--muted-light); margin-top: 0.4rem; letter-spacing: 0.02em; }

  /* Data statement */
  .data-statement { border-left: 2px solid var(--accent); padding: 0.3rem 0 0.3rem 1.2rem; opacity: 0; transform: translateX(-10px); transition: all 0.6s ease 0.15s; }
  .data-statement.visible { opacity: 1; transform: translateX(0); }
  .stat-number { font-family: 'Space Mono', monospace; font-size: 3.2rem; font-weight: 700; color: var(--accent); line-height: 0.95; letter-spacing: -0.03em; }
  .stat-number.fallback-status { font-size: 1.4rem; letter-spacing: 0.02em; line-height: 1; color: var(--muted-light); }
  .stat-label { font-size: 0.6rem; color: var(--muted); letter-spacing: 0.2em; text-transform: uppercase; margin-top: 0.4rem; }
  .stat-label.context { text-transform: none; letter-spacing: 0.02em; font-size: 0.75rem; color: var(--muted-light); line-height: 1.6; font-style: italic; font-family: 'Instrument Serif', serif; }
  .ai-statement { font-family: 'Instrument Serif', serif; font-size: 1rem; font-style: italic; color: var(--text); opacity: 0.9; line-height: 1.45; margin-top: 0.7rem; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }

  /* Threats */
  .threats-block { opacity: 0; transition: opacity 0.5s ease 0.2s; }
  .threats-block.visible { opacity: 1; }
  .threats { font-size: 0.78rem; color: var(--muted-light); line-height: 1.6; }
  .threats-label { font-size: 0.55rem; color: var(--muted); letter-spacing: 0.25em; text-transform: uppercase; font-weight: 700; margin-bottom: 0.3rem; }

  /* Action block */
  .action-block { background: #111; border: 1px solid var(--border); border-radius: 6px; padding: 1rem 1.2rem; position: relative; z-index: 5; flex-shrink: 0; opacity: 0; transition: opacity 0.5s ease 0.3s; }
  .action-block.visible { opacity: 1; }
  .action-top { display: flex; align-items: center; gap: 1.2rem; }
  .action-left { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 0.5rem; }
  .action-right { flex-shrink: 0; }
  .qr-hint { font-size: 0.45rem; color: var(--muted); letter-spacing: 0.15em; text-transform: uppercase; }
  .asso-name { font-family: 'Instrument Serif', serif; font-size: 1.7rem; color: var(--text); line-height: 1.05; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .cagnotte-line { display: flex; align-items: baseline; gap: 0.4rem; flex-wrap: wrap; }
  .cagnotte-total { font-size: 1.2rem; font-weight: 700; color: var(--accent); }
  .cagnotte-sublabel { font-size: 0.55rem; color: var(--muted); letter-spacing: 0.2em; text-transform: uppercase; font-weight: 700; }
  .qr-img { width: 100px; height: 100px; border: 2px solid var(--accent); border-radius: 3px; display: block; }
  .qr-wrapper { position: relative; flex-shrink: 0; }
  .qr-center-label { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-family: 'Space Mono', monospace; font-size: 5.5px; color: var(--accent); background: #111; padding: 2px 4px; letter-spacing: 0.08em; text-transform: uppercase; font-weight: 700; white-space: nowrap; }
  .donors-section { margin-top: 0.6rem; overflow: hidden; min-height: 16px; }
  .donors-section.empty { display: none; }
  .donors-list { overflow: hidden; }
  .donors-track { display: flex; white-space: nowrap; width: max-content; }
  .donors-track.scrolling { animation: tickerScroll 25s linear infinite; }
  @keyframes tickerScroll { from { transform: translateX(0); } to { transform: translateX(-50%); } }

  .donor-tag { font-size: 0.6rem; color: var(--muted-light); background: rgba(255,255,255,0.04); padding: 0.2rem 0.5rem; border-radius: 2px; letter-spacing: 0.05em; margin-right: 0.4rem; }
  .no-donors { display: none; }

  .transition-overlay { position: fixed; inset: 0; background: var(--bg); opacity: 0; pointer-events: none; transition: opacity 0.4s ease; z-index: 50; }
  .transition-overlay.active { opacity: 1; }
  .progress-bar { position: fixed; bottom: 0; left: 0; height: 3px; background: var(--accent); z-index: 100; }
  .grain { position: fixed; inset: 0; pointer-events: none; z-index: 999; opacity: 0.03; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E"); }
  .no-data { height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1rem; }
  .no-data h2 { font-family: 'Instrument Serif', serif; font-size: 2rem; color: var(--muted); }
  .no-data p { color: var(--muted); font-size: 0.8rem; }
</style>
</head>
<body>

<div class="grain"></div>
<div class="loader" id="loader">
  <span class="loader-text">Searching for species...</span>
  <span class="loader-sub">Connecting to citizen observations</span>
</div>
<div class="transition-overlay" id="transition"></div>
<div class="progress-bar" id="progress"></div>

<div class="container" id="main">
  <div class="photo-zone">
    <div class="carousel-track" id="carouselTrack"></div>
    <div class="photo-top-overlay"></div>
    <div class="photo-overlay"></div>
    <div class="carousel-dots" id="carouselDots"></div>
    <div class="spotted-badge">
      <span class="wordmark">Sp<span class="spotted-dot"></span>tted</span>
      <span class="tagline">Real-time citizen observations · Powered by AI</span>
    </div>
    <div class="live-badge">
      <div class="live-top">
        <div class="live-dot"></div>
        <span class="live-label">LIVE</span>
      </div>
      <span class="live-obs" id="liveObsDate"></span>
      <span class="live-obs" id="liveObsCount"></span>
    </div>
    <div class="photo-credit" id="photoCredit"></div>
  </div>

  <!-- Globe overlay (positionné sur le container, pas dans photo-zone) -->
  <div class="globe-container" id="globeContainer">
    <div class="globe-location" id="locationName"></div>
    <div class="globe-ring"></div>
    <div class="globe-svg" id="miniMap">
      <svg id="miniMapSvg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500">
        <defs><clipPath id="globeClip"><circle cx="250" cy="250" r="232"/></clipPath></defs>
        <g clip-path="url(#globeClip)">
          <g id="landLayer"></g>
        </g>
        <circle id="mapDotPulse" cx="0" cy="0" r="0" fill="#c4ff36" fill-opacity="0.3" style="display:none"/>
        <circle id="mapDot" cx="0" cy="0" r="0" fill="#c4ff36" style="display:none"/>
      </svg>
    </div>
  </div>

  <div class="info-side">
    <div class="species-section">
      <div class="status-badge" id="statusBadge"></div>
      <div class="species-identity" id="speciesIdentity">
        <h1 class="species-name" id="speciesName"></h1>
        <p class="species-latin" id="speciesLatin"></p>
      </div>
      <div class="data-statement" id="populationBlock">
        <div class="stat-number" id="popNumber"></div>
        <div class="stat-label" id="popLabel"></div>
        <p class="ai-statement" id="comparison"></p>
      </div>
      <div class="threats-block" id="threatsBlock">
        <div class="threats-label">Threats</div>
        <p class="threats" id="threats"></p>
      </div>
    </div>
    <div class="action-block" id="actionBlock">
      <div class="action-top">
        <div class="action-left">
          <div class="asso-name" id="assoName"></div>
          <div class="cagnotte-line">
            <span class="cagnotte-total" id="cagnotteTotal">€0</span>
            <span class="cagnotte-sublabel" id="cagnotteSublabel">raised · scan to support →</span>
          </div>
        </div>
        <div class="action-right">
          <img id="qrCode" class="qr-img" src="" alt="QR Code">
        </div>
      </div>
      <div class="donors-section" id="donorsSection">
        <div id="donorsList" class="donors-list"></div>
      </div>
    </div>
  </div>
</div>

<div class="no-data" id="noData" style="display:none">
  <h2>No observations today</h2>
  <p id="errorMsg">The workflow collects new data every 10 minutes.</p>
</div>

<script src="https://cdn.jsdelivr.net/npm/d3@7.8.5/dist/d3.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/topojson-client@3.1.0/dist/topojson-client.min.js"></script>
<script>

const SHEET_ID = '1wyv1Fm66Veo5GnBKcnR1iJFvVMtBP0j4nw440u2dvCs';
const DISPLAY_DURATION = 45000; // 45 secondes par espèce
const CAROUSEL_INTERVAL = 4000; // 4 secondes par photo dans le carrousel
let groupedSpecies = []; // tableau de groupes {species: {...}, observations: [...]}
let donations = []; // tableau des dons
let currentIndex = 0;
let lastDonorCount = -1;
let carouselTimer = null;
let currentPhotoIndex = 0;

// ── Chargement Google Sheet (JSONP) ──
function loadSheetData(sheetName) {
  return new Promise((resolve, reject) => {
    const callbackName = 'cb_' + sheetName + '_' + Date.now();
    const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=responseHandler:${callbackName}&sheet=${encodeURIComponent(sheetName)}`;

    window[callbackName] = function(response) {
      try {
        const table = response.table;
        const headers = table.cols.map(c => c.label);
        console.log('[Spotted Debug] Sheet:', sheetName, 'Headers:', headers);
        const rows = table.rows.map((row, rowIdx) => {
          const obj = {};
          row.c.forEach((cell, i) => {
            obj[headers[i]] = cell ? (cell.v !== null && cell.v !== undefined ? String(cell.v) : '') : '';
          });
          if (sheetName === 'especes_affichees' && rowIdx < 5) {
            console.log(`[Spotted Debug] Row ${rowIdx}: nom=${obj.nom_commun}, pop="${obj.population_nombre}", type=${typeof obj.population_nombre}`);
          }
          return obj;
        });
        resolve(rows);
      } catch(e) { reject(e); }
      delete window[callbackName];
    };

    const script = document.createElement('script');
    script.src = url;
    script.onerror = () => reject(new Error('Impossible de charger ' + sheetName));
    document.body.appendChild(script);
  });
}

// ── Regroupement par espèce (nom_scientifique) ──
function groupBySpecies(data) {
  const map = new Map();
  data.forEach(item => {
    if (!item.nom_commun || item.nom_commun.length === 0) return;
    const key = item.nom_scientifique || item.nom_commun;
    if (!map.has(key)) {
      map.set(key, { species: item, observations: [] });
    }
    map.get(key).observations.push(item);
  });
  // Tri par date d'observation la plus récente en premier
  const groups = Array.from(map.values());
  groups.sort((a, b) => parseObsDate(b.species) - parseObsDate(a.species));
  return groups;
}

function parseObsDate(item) {
  // Essayer heure_observation (ISO) d'abord
  const iso = item.heure_observation || '';
  if (iso.includes('T')) return new Date(iso).getTime() || 0;
  // Sinon date_observation au format Google Sheets "Date(2026,3,12)"
  const d = (item.date_observation || '').match(/Date\((\d+),(\d+),(\d+)/);
  if (d) return new Date(d[1], d[2], d[3]).getTime();
  return 0;
}

// ── Dons par espèce ──
function getDonationsForSpecies(speciesName) {
  return donations.filter(d =>
    d.espece && speciesName &&
    d.espece.toLowerCase().trim() === speciesName.toLowerCase().trim()
  );
}

function getTotalDonations(speciesName) {
  const speciesDons = getDonationsForSpecies(speciesName);
  return speciesDons.reduce((sum, d) => sum + (parseFloat(d.montant) || 0), 0);
}

// ── Formatage ──
function formatPopulation(num) {
  if (num === null || num === undefined || num === '' || num === 'null') return null;
  const n = Math.round(parseFloat(num));
  if (isNaN(n) || n <= 0) return null;
  if (n >= 1000000) return (n / 1000000).toFixed(1).replace('.0', '') + 'M';
  if (n >= 1000) return n.toLocaleString('en-US');
  return n.toString();
}

function formatDate(dateStr) {
  if (!dateStr) return '';
  const dateMatch = dateStr.match(/Date\((\d+),(\d+),(\d+)\)/);
  if (dateMatch) {
    const y = dateMatch[1];
    const m = String(parseInt(dateMatch[2]) + 1).padStart(2, '0');
    const d = dateMatch[3].padStart(2, '0');
    return `${d}/${m}/${y}`;
  }
  return dateStr;
}

function formatTime(timeStr) {
  if (!timeStr) return '';
  // Format ISO depuis iNaturalist : "2026-04-12T14:30:00+05:30"
  const isoMatch = timeStr.match(/T(\d{2}):(\d{2})/);
  if (isoMatch) return `${isoMatch[1]}:${isoMatch[2]}`;
  // Format Google Sheets : "Date(2026,3,12,14,46,5)"
  const gsMatch = timeStr.match(/Date\((\d+),(\d+),(\d+),(\d+),(\d+)/);
  if (gsMatch) {
    const h = gsMatch[4].padStart(2, '0');
    const min = gsMatch[5].padStart(2, '0');
    return `${h}:${min}`;
  }
  return '';
}

function getStatusLabel(code) {
  const labels = { 'cr': 'Critically endangered', 'en': 'Endangered', 'vu': 'Vulnerable' };
  return labels[code?.toLowerCase()] || code?.toUpperCase() || '';
}

function getStatusClass(code) {
  return 'status-' + (code?.toLowerCase() || 'vu');
}



// ── Mini carte (équirectangulaire + zoom + pin pulsant) ──
const MAP_W = 1000, MAP_H = 500;
const ZOOM_RADIUS_DEG = 22; // demi-angle de la zone visible en degrés
let miniMapReady = false;
let miniMapRAF = null;

function initWorldMap() {
  if (typeof d3 === 'undefined' || typeof topojson === 'undefined') {
    console.warn('d3/topojson non chargés, globe désactivé');
    return;
  }
  const WORLD_URL = 'https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json';
  d3.json(WORLD_URL).then(world => {
    window._worldData = topojson.feature(world, world.objects.countries);
    miniMapReady = true;
    // Render initial globe centered on 0,0
    renderGlobe(0, 0);
  }).catch(err => {
    console.error('Erreur chargement world map:', err);
  });
}

function renderGlobe(lat, lng) {
  const svg = document.getElementById('miniMapSvg');
  const landLayer = document.getElementById('landLayer');
  if (!svg || !landLayer || !window._worldData) return;
  
  const size = 500; // viewBox is 500x500
  const projection = d3.geoOrthographic()
    .scale(size / 2.15)
    .translate([size / 2, size / 2])
    .rotate([-lng, -lat, 0])
    .clipAngle(90);
  const pathGen = d3.geoPath(projection);
  
  // Clear and re-render
  landLayer.innerHTML = '';
  
  // Globe background circle (ocean)
  const ocean = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
  ocean.setAttribute('cx', size / 2);
  ocean.setAttribute('cy', size / 2);
  ocean.setAttribute('r', size / 2.15);
  ocean.setAttribute('fill', '#111');
  ocean.setAttribute('stroke', 'none');
  ocean.setAttribute('stroke-width', '0');
  landLayer.appendChild(ocean);
  
  // Graticule (subtle grid lines)
  const graticule = d3.geoGraticule().step([30, 30]);
  const gratPath = document.createElementNS('http://www.w3.org/2000/svg', 'path');
  gratPath.setAttribute('d', pathGen(graticule()) || '');
  gratPath.setAttribute('fill', 'none');
  gratPath.setAttribute('stroke', '#1a1a1a');
  gratPath.setAttribute('stroke-width', '0.5');
  landLayer.appendChild(gratPath);
  
  // Countries
  window._worldData.features.forEach(c => {
    const d = pathGen(c);
    if (!d) return;
    const p = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    p.setAttribute('d', d);
    p.setAttribute('fill', '#222');
    p.setAttribute('stroke', '#2a2a2a');
    p.setAttribute('stroke-width', '0.5');
    landLayer.appendChild(p);
  });
  
  // Observation point
  const projected = projection([lng, lat]);
  if (projected) {
    const dot = document.getElementById('mapDot');
    const pulse = document.getElementById('mapDotPulse');
    dot.setAttribute('cx', projected[0]);
    dot.setAttribute('cy', projected[1]);
    dot.setAttribute('r', 8);
    dot.style.display = 'block';
    pulse.setAttribute('cx', projected[0]);
    pulse.setAttribute('cy', projected[1]);
    pulse.setAttribute('r', 12);
    pulse.style.display = 'block';
    
    // Positionner le texte du lieu au-dessus du pin
    const locEl = document.getElementById('locationName');
    if (locEl) {
      const pctX = (projected[0] / size) * 100;
      const pctY = (projected[1] / size) * 100;
      locEl.style.left = pctX + '%';
      locEl.style.top = pctY + '%';
      locEl.style.transform = 'translate(-50%, -180%)';
    }
  }
}

function animateViewBox(svg, fromVB, toVB, duration = 900) {
  if (miniMapRAF) cancelAnimationFrame(miniMapRAF);
  const start = performance.now();
  function step(now) {
    const t = Math.min((now - start) / duration, 1);
    const eased = 1 - Math.pow(1 - t, 3); // ease-out cubic
    const current = fromVB.map((v, i) => v + (toVB[i] - v) * eased);
    svg.setAttribute('viewBox', current.join(' '));
    if (t < 1) miniMapRAF = requestAnimationFrame(step);
  }
  miniMapRAF = requestAnimationFrame(step);
}

function updateMiniMap(lat, lng) {
  const map = document.getElementById('miniMap');
  if (!lat || !lng || lat === '' || lng === '') {
    if (map) map.style.opacity = '0.3';
    return;
  }
  lat = parseFloat(lat);
  lng = parseFloat(lng);
  if (isNaN(lat) || isNaN(lng)) {
    if (map) map.style.opacity = '0.3';
    return;
  }
  if (map) map.style.opacity = '1';
  if (miniMapReady) renderGlobe(lat, lng);
}

// ── Carrousel photos ──
function setupCarousel(observations) {
  const track = document.getElementById('carouselTrack');
  const dotsContainer = document.getElementById('carouselDots');
  track.innerHTML = '';
  dotsContainer.innerHTML = '';
  if (carouselTimer) clearInterval(carouselTimer);

  // Collecter les photos valides + observateurs
  const photos = [];
  observations.forEach(obs => {
    const url = obs.photo_url || '';
    if (url && url.length > 5) {
      photos.push({ url, observer: obs.observateur || '' });
    }
  });

  if (photos.length === 0) {
    track.innerHTML = '<div class="photo-placeholder">No photo available</div>';
    document.getElementById('photoCredit').textContent = '';
    return;
  }

  // Créer les images
  photos.forEach((p, i) => {
    const img = document.createElement('img');
    img.src = p.url;
    img.alt = '';
    img.loading = i === 0 ? 'eager' : 'lazy';
    if (i === 0) img.classList.add('active');
    img.onerror = () => { img.style.display = 'none'; };
    track.appendChild(img);
  });

  // Dots (seulement si > 1 photo)
  if (photos.length > 1) {
    photos.forEach((_, i) => {
      const dot = document.createElement('div');
      dot.className = 'carousel-dot' + (i === 0 ? ' active' : '');
      dotsContainer.appendChild(dot);
    });
  }

  // Credit
  document.getElementById('photoCredit').textContent =
    photos[0].observer ? `Obs. ${photos[0].observer} — iNaturalist` : 'iNaturalist';

  currentPhotoIndex = 0;

  // Auto-rotation
  if (photos.length > 1) {
    carouselTimer = setInterval(() => {
      const imgs = track.querySelectorAll('img');
      const dots = dotsContainer.querySelectorAll('.carousel-dot');
      imgs[currentPhotoIndex]?.classList.remove('active');
      dots[currentPhotoIndex]?.classList.remove('active');

      currentPhotoIndex = (currentPhotoIndex + 1) % photos.length;

      imgs[currentPhotoIndex]?.classList.add('active');
      dots[currentPhotoIndex]?.classList.add('active');

      document.getElementById('photoCredit').textContent =
        photos[currentPhotoIndex].observer
          ? `Obs. ${photos[currentPhotoIndex].observer} — iNaturalist`
          : 'iNaturalist';
    }, CAROUSEL_INTERVAL);
  }
}

// ── Utilitaires ──
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// ── Affichage d'une espèce ──
function displaySpecies(group) {
  const transition = document.getElementById('transition');
  transition.classList.add('active');

  setTimeout(() => {
   try {
    const item = group.species;

    // Carrousel photos
    setupCarousel(group.observations);

    // Mini carte
    updateMiniMap(item.latitude, item.longitude);

    // Badge statut
    const badge = document.getElementById('statusBadge');
    badge.textContent = getStatusLabel(item.statut_iucn);
    badge.className = 'status-badge ' + getStatusClass(item.statut_iucn);

    // Nom (première lettre en majuscule)
    const identity = document.getElementById('speciesIdentity');
    identity.classList.remove('visible');
    const rawName = item.nom_commun || 'Unknown species';
    const displayName = rawName.charAt(0).toUpperCase() + rawName.slice(1);
    document.getElementById('speciesName').textContent = displayName;
    // Masquer le nom latin s'il est identique au nom commun (cas des espèces sans nom commun anglais)
    const latin = item.nom_scientifique || '';
    document.getElementById('speciesLatin').textContent =
      latin.toLowerCase() === rawName.toLowerCase() ? '' : latin;
    setTimeout(() => identity.classList.add('visible'), 80);

    // Population — fallback adaptatif selon la data
    const popBlock = document.getElementById('populationBlock');
    popBlock.classList.remove('visible');
    const pop = formatPopulation(item.population_nombre);
    const confidence = (item.population_confidence || '').toLowerCase();
    const hasReliablePop = pop && confidence !== 'low';
    const popNumber = document.getElementById('popNumber');
    const popLabel = document.getElementById('popLabel');
    popLabel.classList.remove('context');
    popNumber.classList.remove('fallback-status');

    if (hasReliablePop) {
      // Cas normal : gros chiffre + label fixe
      popNumber.textContent = pop;
      popLabel.textContent = 'estimated remaining individuals';
    } else {
      // Fallback : le statut IUCN devient le hero (pas de tiret orphelin)
      popNumber.textContent = '—';
      popNumber.classList.add('fallback-status');
      popLabel.textContent = 'no reliable population estimate';
      // Le badge statut suffit, pas besoin de le dupliquer
    }

    // Phrase narrative Groq : toujours affichée si dispo (même sans chiffre)
    const compEl = document.getElementById('comparison');
    let narrativeText = '';
    if (hasReliablePop && item.comparaison && item.comparaison !== 'null' && item.comparaison.length > 2) {
      narrativeText = item.comparaison;
    } else if (!hasReliablePop && item.population_context && item.population_context !== 'null' && item.population_context.length > 2) {
      // Sans chiffre, on montre le contexte qualitatif Groq
      narrativeText = item.population_context;
    }
    if (narrativeText) {
      compEl.innerHTML = escapeHtml(narrativeText);
      compEl.style.display = '-webkit-box';
    } else {
      compEl.style.display = 'none';
    }
    setTimeout(() => popBlock.classList.add('visible'), 150);

    // Menaces (AI synthesis of IUCN narrative)
    const threatsBlock = document.getElementById('threatsBlock');
    threatsBlock.classList.remove('visible');
    const threats = document.getElementById('threats');
    if (item.menaces_resume && item.menaces_resume !== 'null' && item.menaces_resume.length > 2) {
      threats.textContent = item.menaces_resume;
      threatsBlock.style.display = 'block';
      setTimeout(() => threatsBlock.classList.add('visible'), 200);
    } else {
      threatsBlock.style.display = 'none';
    }

    // Localisation — la mini-map reste visible, seul le texte fait la transition
    const globeC = document.getElementById('globeContainer');
    if (globeC) globeC.classList.remove('visible');
    const lieuRaw = item.lieu || '';
    const pays = item.pays_nom || '';
    
    // Nettoyage intelligent du lieu
    let ville = '';
    if (lieuRaw) {
      const parts = lieuRaw.split(',').map(s => s.trim());
      // Filtrer les parties inutiles : codes 2-3 lettres seuls, pays en double, vide
      const validParts = parts.filter(p => {
        if (!p) return false;
        if (/^[A-Z]{2,3}$/.test(p)) return false; // codes comme "US", "AU", "IL"
        if (/^[A-Z]{2}-[A-Z0-9]+$/.test(p)) return false; // codes comme "CL-AR"
        if (p.toLowerCase() === pays.toLowerCase()) return false; // doublon pays
        return true;
      });
      ville = validParts[0] || '';
      // Nettoyer les codes postaux
      ville = ville.replace(/^\d{4,5}\s+/, '');
      ville = ville.replace(/\s+[A-Z]{2,3}\s+\d{3,5}$/, '');
      ville = ville.replace(/^[A-Z]{2,3}\s+\d{3,5}\s+/, '');
      // Nettoyer les caractères parasites de translittération (backticks, primes, etc.)
      ville = ville.replace(/[`´ʼʹʻʽ]/g, "'");
      ville = ville.replace(/\s+/g, ' ');
      ville = ville.trim();
    }
    
    let locationDisplay = '';
    if (ville && pays) locationDisplay = `${ville}, ${pays}`;
    else if (pays) locationDisplay = pays;
    else if (ville) locationDisplay = ville;
    else locationDisplay = 'Unknown location';
    document.getElementById('locationName').textContent = locationDisplay;

    const dateStr = formatDate(item.date_observation);
    const timeStr = formatTime(item.heure_observation);
    const nbObs = group.observations.length;
    
    // LIVE / TODAY badge
    const liveBadge = document.querySelector('.live-badge');
    const liveDot = document.querySelector('.live-dot');
    const liveLabel = document.querySelector('.live-label');
    const liveObsDateEl = document.getElementById('liveObsDate');
    const liveObsCountEl = document.getElementById('liveObsCount');
    const isMostRecent = groupedSpecies.length > 0 && parseObsDate(item) === parseObsDate(groupedSpecies[0].species);
    
    // Vérifier si observé aujourd'hui ou hier
    const obsTimestamp = parseObsDate(item);
    const now = new Date();
    const obsDate = new Date(obsTimestamp);
    const isToday = obsTimestamp > 0 && obsDate.getDate() === now.getDate() && obsDate.getMonth() === now.getMonth() && obsDate.getFullYear() === now.getFullYear();
    const yesterday = new Date(now);
    yesterday.setDate(yesterday.getDate() - 1);
    const isYesterday = obsTimestamp > 0 && obsDate.getDate() === yesterday.getDate() && obsDate.getMonth() === yesterday.getMonth() && obsDate.getFullYear() === yesterday.getFullYear();
    
    if (liveBadge) {
      let obsSubtext = '';
      const dStr = formatDate(item.date_observation);
      const tStr = formatTime(item.heure_observation);
      if (dStr) obsSubtext = `Observed ${dStr}`;
      if (tStr) obsSubtext += ` · ${tStr}`;
      
      if (isMostRecent) {
        liveBadge.style.display = 'flex';
        if (liveDot) { liveDot.style.background = 'var(--accent)'; liveDot.classList.add('blink'); }
        if (liveLabel) { liveLabel.textContent = 'LIVE'; liveLabel.style.color = 'var(--accent)'; }
        if (liveObsDateEl) liveObsDateEl.textContent = obsSubtext;
        if (liveObsCountEl) liveObsCountEl.textContent = nbObs > 1 ? `${nbObs} observations` : '';
        if (liveObsCountEl) liveObsCountEl.style.color = 'var(--accent)';
      } else if (isToday) {
        liveBadge.style.display = 'flex';
        if (liveDot) { liveDot.style.background = 'rgba(255,255,255,0.5)'; liveDot.classList.add('blink'); }
        if (liveLabel) { liveLabel.textContent = 'TODAY'; liveLabel.style.color = 'rgba(255,255,255,0.5)'; }
        if (liveObsDateEl) liveObsDateEl.textContent = obsSubtext;
        if (liveObsCountEl) liveObsCountEl.textContent = nbObs > 1 ? `${nbObs} observations` : '';
        if (liveObsCountEl) liveObsCountEl.style.color = 'rgba(255,255,255,0.35)';
      } else if (isYesterday) {
        liveBadge.style.display = 'flex';
        if (liveDot) { liveDot.style.background = 'rgba(255,255,255,0.35)'; liveDot.classList.remove('blink'); }
        if (liveLabel) { liveLabel.textContent = 'YESTERDAY'; liveLabel.style.color = 'rgba(255,255,255,0.35)'; }
        if (liveObsDateEl) liveObsDateEl.textContent = obsSubtext;
        if (liveObsCountEl) liveObsCountEl.textContent = nbObs > 1 ? `${nbObs} observations` : '';
        if (liveObsCountEl) liveObsCountEl.style.color = 'rgba(255,255,255,0.35)';
      } else {
        liveBadge.style.display = 'flex';
        if (liveDot) { liveDot.style.background = 'rgba(255,255,255,0.3)'; liveDot.classList.remove('blink'); }
        if (liveLabel) { liveLabel.textContent = dStr || ''; liveLabel.style.color = 'rgba(255,255,255,0.3)'; }
        if (liveObsDateEl) liveObsDateEl.textContent = tStr ? `Observed · ${tStr}` : '';
        if (liveObsCountEl) liveObsCountEl.textContent = nbObs > 1 ? `${nbObs} observations` : '';
        if (liveObsCountEl) liveObsCountEl.style.color = 'rgba(255,255,255,0.35)';
      }
    }
    setTimeout(() => { if (globeC) globeC.classList.add('visible'); }, 250);

    // Bloc action (cagnotte + asso + QR)
    const actionBlock = document.getElementById('actionBlock');
    actionBlock.classList.remove('visible');
    const speciesName = item.nom_commun || '';
    const total = getTotalDonations(speciesName);
    document.getElementById('cagnotteTotal').textContent = total > 0 ? `€${total.toFixed(0)}` : '€0';

    const donorsList = document.getElementById('donorsList');
    const donorsSection = document.getElementById('donorsSection');
    const cagnotteSublabel = document.getElementById('cagnotteSublabel');
    const speciesDons = getDonationsForSpecies(speciesName);
    if (speciesDons.length > 0) {
      if (cagnotteSublabel) cagnotteSublabel.textContent = `raised · ${speciesDons.length} donor${speciesDons.length > 1 ? 's' : ''}`;
      donorsSection.classList.remove('empty');
      const tags = speciesDons
        .slice(-20)
        .map(d => `<span class="donor-tag">${d.prenom || 'Anonymous'}${d.pays ? ' · ' + d.pays : ''}</span>`)
        .join('');
      if (speciesDons.length > 2) {
        donorsList.innerHTML = `<div class="donors-track scrolling">${tags}${tags}</div>`;
      } else {
        donorsList.innerHTML = `<div class="donors-track">${tags}</div>`;
      }
      lastDonorCount = speciesDons.length;
    } else {
      if (cagnotteSublabel) cagnotteSublabel.textContent = 'raised · be the first to donate';
      donorsSection.classList.add('empty');
      donorsList.innerHTML = '';
      lastDonorCount = 0;
    }
    setTimeout(() => actionBlock.classList.add('visible'), 250);

    // Asso
    document.getElementById('assoName').textContent = item.asso_nom || 'WWF';

    // QR Code vers page de don personnalisee
    const donPageUrl = `https://jenntqc.github.io/spotted/don.html?espece=${encodeURIComponent(speciesName)}&latin=${encodeURIComponent(item.nom_scientifique || '')}&asso=${encodeURIComponent(item.asso_nom || '')}&photo=${encodeURIComponent(item.photo_url || '')}`;
    document.getElementById('qrCode').src =
      `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(donPageUrl)}&bgcolor=0a0a0a&color=c4ff36`;

    setTimeout(() => transition.classList.remove('active'), 300);
   } catch(e) { console.error('displaySpecies error:', e); transition.classList.remove('active'); }
  }, 400);
}

// ── Progress bar ──
function startProgress() {
  const bar = document.getElementById('progress');
  bar.style.transition = 'none';
  bar.style.width = '0%';
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      bar.style.transition = `width ${DISPLAY_DURATION}ms linear`;
      bar.style.width = '100%';
    });
  });
}

// ── Navigation ──
let autoTimer = null;

function nextSpecies() {
  currentIndex = (currentIndex + 1) % groupedSpecies.length;
  displaySpecies(groupedSpecies[currentIndex]);
  startProgress();
}

function prevSpecies() {
  currentIndex = (currentIndex - 1 + groupedSpecies.length) % groupedSpecies.length;
  displaySpecies(groupedSpecies[currentIndex]);
  startProgress();
}

function resetAutoTimer() {
  if (autoTimer) clearInterval(autoTimer);
  autoTimer = setInterval(nextSpecies, DISPLAY_DURATION);
}

// Flèches clavier : gauche/droite pour naviguer, reset le timer
document.addEventListener('keydown', (e) => {
  if (groupedSpecies.length === 0) return;
  if (e.key === 'ArrowRight') {
    nextSpecies();
    resetAutoTimer();
  } else if (e.key === 'ArrowLeft') {
    prevSpecies();
    resetAutoTimer();
  }
});

// ── Init ──
async function init() {
  try {
    // Charger la carte du monde (équirectangulaire) - une seule fois
    initWorldMap();

    // Charger les deux onglets en parallele
    const [speciesData, donationsData] = await Promise.all([
      loadSheetData('especes_affichees'),
      loadSheetData('dons').catch(() => []) // pas grave si l'onglet dons n'existe pas encore
    ]);

    donations = donationsData || [];

    // Regrouper par espèce
    groupedSpecies = groupBySpecies(speciesData);

    if (groupedSpecies.length === 0) {
      document.getElementById('loader').classList.add('hidden');
      document.getElementById('noData').style.display = 'flex';
      return;
    }

    currentIndex = 0;
    document.getElementById('loader').classList.add('hidden');
    document.getElementById('main').classList.add('visible');

    displaySpecies(groupedSpecies[0]);
    startProgress();
    resetAutoTimer();

    // Rafraichissement espèces toutes les 5 min
    setInterval(async () => {
      try {
        const [newSpecies, newDons] = await Promise.all([
          loadSheetData('especes_affichees'),
          loadSheetData('dons').catch(() => [])
        ]);
        const newGrouped = groupBySpecies(newSpecies);
        if (newGrouped.length > 0) groupedSpecies = newGrouped;
        if (newDons) donations = newDons;
      } catch(e) {}
    }, 30000);

    // Rafraichissement dons toutes les 5 secondes (cagnotte + ticker en quasi temps réel)
    setInterval(async () => {
      try {
        const newDons = await loadSheetData('dons').catch(() => null);
        if (!newDons) return;
        donations = newDons;
        // Mettre à jour l'affichage du don pour l'espèce en cours
        const current = groupedSpecies[currentIndex];
        if (!current) return;
        const speciesName = current.species.nom_commun || '';
        const total = getTotalDonations(speciesName);
        document.getElementById('cagnotteTotal').textContent = total > 0 ? `€${total.toFixed(0)}` : '€0';
        const donorsList = document.getElementById('donorsList');
        const donorsSection = document.getElementById('donorsSection');
        const cagnotteSublabel = document.getElementById('cagnotteSublabel');
        const speciesDons = getDonationsForSpecies(speciesName);
        if (speciesDons.length > 0) {
          if (cagnotteSublabel) cagnotteSublabel.textContent = `raised · ${speciesDons.length} donor${speciesDons.length > 1 ? 's' : ''}`;
          donorsSection.classList.remove('empty');
          // Ne recréer le ticker QUE si le nombre de donors a changé
          if (speciesDons.length !== lastDonorCount) {
            lastDonorCount = speciesDons.length;
            const tags = speciesDons
              .slice(-20)
              .map(d => `<span class="donor-tag">${d.prenom || 'Anonymous'}${d.pays ? ' · ' + d.pays : ''}</span>`)
              .join('');
            if (speciesDons.length > 2) {
              donorsList.innerHTML = `<div class="donors-track scrolling">${tags}${tags}</div>`;
            } else {
              donorsList.innerHTML = `<div class="donors-track">${tags}</div>`;
            }
          }
        } else {
          if (cagnotteSublabel) cagnotteSublabel.textContent = 'raised · be the first to donate';
          donorsSection.classList.add('empty');
          donorsList.innerHTML = '';
          lastDonorCount = 0;
        }
      } catch(e) {}
    }, 5000);

  } catch (error) {
    document.getElementById('loader').classList.add('hidden');
    document.getElementById('noData').style.display = 'flex';
    document.getElementById('errorMsg').textContent = 'Erreur : ' + error.message;
  }
}

init();
